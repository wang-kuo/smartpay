services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: smartpay
      POSTGRES_PASSWORD: smartpay
      POSTGRES_DB: smartpay
    ports:
      - "5432:5432"
    volumes:
      - smartpay-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartpay -d smartpay"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  smartpay-postgres:
